name: 전시 정보 주간 자동 업데이트

on:
  schedule:
    # 매주 월요일 오전 9시 (KST = UTC+9, 즉 UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # GitHub Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  update-exhibitions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 전시 정보 업데이트
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_exhibitions.py

      - name: 변경 사항 커밋 & 푸시
        run: |
          git config --global user.name  "ARTHAUS Bot"
          git config --global user.email "bot@arthaus.kr"
          git add exhibitions.json
          # 변경이 있을 때만 커밋
          if git diff --cached --quiet; then
            echo "변경된 전시 정보 없음 — 커밋 생략"
          else
            git commit -m "chore: 전시 정보 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
            echo "✅ 업데이트 완료"
          fi
